name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-container-app-production
  cancel-in-progress: false

env:
  IMAGE_NAME: tr-alert-gpt54

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install --disable-pip-version-check -r requirements.txt

      - name: Compile production modules
        run: |
          python -m py_compile \
            main.py nse_scraper.py bse_scraper.py utils.py \
            gpt54_extractor.py financial_pipeline.py financial_validation.py \
            image_generator.py pl_image.py bs_cf_image.py segment_image.py

      - name: Run NSE and BSE discovery regression tests
        run: python -m unittest test_bse_scraper.py test_nse_scraper.py

      - name: Run PDF queue concurrency tests
        run: python -B test_pdf_job_concurrency.py

      - name: Run financial pipeline guard tests
        run: python -B test_financial_image_guards.py

  build-and-deploy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required deployment secrets
        shell: bash
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_REGISTRY_LOGIN_SERVER: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
          AZURE_REGISTRY_USERNAME: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          AZURE_REGISTRY_PASSWORD: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
        run: |
          missing=0
          for name in \
            AZURE_CREDENTIALS \
            AZURE_REGISTRY_LOGIN_SERVER \
            AZURE_REGISTRY_USERNAME \
            AZURE_REGISTRY_PASSWORD \
            AZURE_RESOURCE_GROUP \
            AZURE_CONTAINER_APP_NAME
          do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push immutable Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure Container App registry authentication
        run: |
          az containerapp registry set \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --server "${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}" \
            --username "${{ secrets.AZURE_REGISTRY_USERNAME }}" \
            --password "${{ secrets.AZURE_REGISTRY_PASSWORD }}"

      - name: Verify persistent runtime storage mount
        shell: bash
        run: |
          mount_volume=$(az containerapp show \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].volumeMounts[?mountPath=='/data'].volumeName | [0]" \
            --output tsv)

          if [[ -z "$mount_volume" ]]; then
            echo "::error::Container App must mount persistent Azure Files storage at /data before deployment."
            exit 1
          fi

          storage_name=$(az containerapp show \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.template.volumes[?name=='${mount_volume}' && storageType=='AzureFile'].storageName | [0]" \
            --output tsv)

          if [[ -z "$storage_name" ]]; then
            echo "::error::The /data volume must use persistent AzureFile storage, not ephemeral EmptyDir storage."
            exit 1
          fi

          echo "Persistent runtime storage verified: volume=$mount_volume storage=$storage_name mount=/data"

      - name: Deploy a new Azure Container Apps revision
        id: deploy
        shell: bash
        run: |
          revision_suffix="gh-${GITHUB_RUN_NUMBER}-${GITHUB_SHA:0:7}"
          image="${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA}"

          az containerapp update \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "$image" \
            --revision-suffix "$revision_suffix" \
            --min-replicas 1 \
            --max-replicas 1 \
            --set-env-vars \
              "APP_VERSION=${GITHUB_SHA}" \
              "TR_ALERT_DATA_DIR=/data" \
              "MAX_CONCURRENT_PDF_JOBS=1" \
              "PDF_JOB_RETRY_LIMIT=1" \
              "GPT54_TIMEOUT_SECONDS=1800" \
              "GPT54_COMPLEX_TIMEOUT_SECONDS=2700" \
              "GPT_REQUEST_TIMEOUT_SECONDS=1800" \
              "GPT54_HTTP_RETRIES=1" \
              "GPT54_BACKGROUND_MODE=true" \
              "GPT54_BACKGROUND_POLL_SECONDS=5" \
              "GPT54_MAX_OUTPUT_TOKENS=48000" \
              "GPT54_DEFAULT_REASONING_EFFORT=high" \
              "GPT54_COMPLEX_REASONING_EFFORT=high" \
              "GPT54_USE_XHIGH_FOR_COMPLEX=false" \
              "GPT54_RETRY_XHIGH_ON_VALUES_FIRST_WARNINGS=false"

          revision_name=$(az containerapp show \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query properties.latestRevisionName \
            --output tsv)

          echo "revision_name=$revision_name" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Verify deployed revision
        shell: bash
        run: |
          revision="${{ steps.deploy.outputs.revision_name }}"
          expected_image="${{ steps.deploy.outputs.image }}"

          for attempt in {1..30}; do
            state=$(az containerapp revision show \
              --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --revision "$revision" \
              --query properties.runningState \
              --output tsv)

            echo "Revision $revision state: $state"
            if [[ "$state" == "Running" || "$state" == "RunningAtMaxScale" ]]; then
              break
            fi
            if [[ "$state" == "Failed" || "$state" == "Degraded" ]]; then
              echo "::error::Azure revision entered state: $state"
              exit 1
            fi
            if [[ "$attempt" == "30" ]]; then
              echo "::error::Azure revision did not become ready within five minutes"
              exit 1
            fi
            sleep 10
          done

          deployed_image=$(az containerapp revision show \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --revision "$revision" \
            --query properties.template.containers[0].image \
            --output tsv)

          if [[ "$deployed_image" != "$expected_image" ]]; then
            echo "::error::Revision image mismatch: expected $expected_image, got $deployed_image"
            exit 1
          fi

          echo "Azure revision $revision is running image $deployed_image"
